<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Events — TICKETS HUB</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div class="top-bar">
    <div class="top-bar-content">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="hamburger-btn" onclick="toggleHamburger()">
          <i class="fas fa-bars"></i>
        </button>
        <a href="index.html" class="logo">
          <div class="logo-icon">TH</div>
          <span>TICKETS <span class="purple">HUB</span></span>
        </a>
      </div>
      <div id="userGreeting" class="user-greeting"></div>
    </div>
  </div>

  <div class="menu-overlay" id="menuOverlay" onclick="toggleHamburger()"></div>
  <div class="hamburger-menu" id="hamburgerMenu">
    <div class="menu-section">Menu</div>
    <a href="index.html"><i class="fas fa-home"></i> Home</a>
    <a href="events.html" class="active"><i class="fas fa-fire"></i> For You</a>
    <a href="my-tickets.html"><i class="fas fa-ticket-alt"></i> My Tickets</a>
    <a href="cart.html"><i class="fas fa-shopping-cart"></i> Cart</a>
    <div class="menu-section">Account</div>
    <a href="account.html"><i class="fas fa-user"></i> My Account</a>
    <a href="login.html" id="menuLogin"><i class="fas fa-sign-in-alt"></i> Sign In</a>
    <a href="register.html" id="menuRegister"><i class="fas fa-user-plus"></i> Register</a>
    <div class="menu-section" id="adminMenuSection" style="display:none">Admin</div>
    <a href="admin.html" id="menuAdmin" style="display:none"><i class="fas fa-cog"></i> Admin Panel</a>
    <a href="#" id="menuLogout" style="display:none" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Sign Out</a>
  </div>

  <section class="page-section">
    <h1>For You</h1>
    
    <div class="search-bar">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="Search events, venues, cities..." onkeyup="filterEvents()">
    </div>

    <div class="events-grid" id="eventsContainer">
      <p class="text-gray" style="text-align:center;padding:40px;grid-column:1/-1">Loading events...</p>
    </div>
  </section>

  <nav class="bottom-nav">
    <a href="index.html" class="bottom-nav-item">
      <i class="fas fa-compass"></i>
      <span>Discover</span>
    </a>
    <a href="events.html" class="bottom-nav-item active">
      <i class="fas fa-fire"></i>
      <span>For You</span>
    </a>
    <a href="my-tickets.html" class="bottom-nav-item">
      <i class="fas fa-ticket-alt"></i>
      <span>My Tickets</span>
    </a>
    <a href="account.html" class="bottom-nav-item">
      <i class="fas fa-user"></i>
      <span>My Account</span>
    </a>
  </nav>

  <footer>
    <div class="footer-content">
      <div class="logo" style="justify-content:center">
        <div class="logo-icon">TH</div>
        <span>TICKETS <span class="purple">HUB</span></span>
      </div>
      <p>Your trusted marketplace for premium tickets worldwide.</p>
      <p class="copyright">&copy; 2026 TICKETS HUB. All rights reserved.</p>
    </div>
  </footer>

  <script>
    const BACKEND_URL = 'https://tickets-hub10-backend.onrender.com';

    function toggleHamburger() {
      document.getElementById('hamburgerMenu').classList.toggle('show');
      document.getElementById('menuOverlay').classList.toggle('show');
    }

    function logout() {
      localStorage.removeItem('th_user');
      window.location.href = 'index.html';
    }

    function checkUser() {
      const user = JSON.parse(localStorage.getItem('th_user') || 'null');
      const greeting = document.getElementById('userGreeting');
      const menuLogin = document.getElementById('menuLogin');
      const menuRegister = document.getElementById('menuRegister');
      const menuLogout = document.getElementById('menuLogout');
      const menuAdmin = document.getElementById('menuAdmin');
      const adminSection = document.getElementById('adminMenuSection');

      if (user) {
        greeting.innerHTML = `<span style="color:#C77DFF">Hi, ${user.name}</span>`;
        menuLogin.style.display = 'none';
        menuRegister.style.display = 'none';
        menuLogout.style.display = 'flex';
        if (user.isAdmin) {
          menuAdmin.style.display = 'flex';
          adminSection.style.display = 'block';
        }
      } else {
        greeting.innerHTML = `<a href="login.html" style="color:#999;text-decoration:none;font-size:14px">Sign In</a>`;
        menuLogin.style.display = 'flex';
        menuRegister.style.display = 'flex';
        menuLogout.style.display = 'none';
        menuAdmin.style.display = 'none';
        adminSection.style.display = 'none';
      }
    }

    function getCurrency(city) {
      if (city.includes('Korea')) return '₩';
      if (city.includes('Japan')) return '¥';
      if (city.includes('Thailand')) return '฿';
      return '₩';
    }

    async function loadEvents() {
      const container = document.getElementById('eventsContainer');
      try {
        const res = await fetch(`${BACKEND_URL}/api/events`);
        const events = await res.json();

        if (!events || events.length === 0) {
          container.innerHTML = '<p class="text-gray" style="text-align:center;padding:40px;grid-column:1/-1">No events available yet.</p>';
          return;
        }

        container.innerHTML = events.map(ev => {
          const currency = getCurrency(ev.city);
          return `
            <div class="event-card" data-title="${ev.name}" data-venue="${ev.venue}">
              <div class="event-img" style="background-image:url('${ev.image}')"></div>
              <div class="event-info">
                <h3>${ev.name}</h3>
                <p><i class="fas fa-calendar"></i> ${new Date(ev.date + 'T00:00:00').toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })}</p>
                <p><i class="fas fa-map-marker-alt"></i> ${ev.venue}, ${ev.city}</p>
                <div style="margin:8px 0">
                  <span class="badge">VIP</span>
                  <span class="price" style="display:inline;font-size:0.95em">${currency}${(ev.vipPrice || 0).toLocaleString()}</span>
                </div>
                <div style="margin:8px 0">
                  <span class="badge standard">Standard</span>
                  <span class="price" style="display:inline;font-size:0.95em">${currency}${(ev.stdPrice || 0).toLocaleString()}</span>
                </div>
                <button class="btn btn-primary btn-sm" onclick='addToCart("${ev.name.replace(/'/g, "\\'")}", "VIP", ${ev.vipPrice}, "${currency}")'>Buy VIP</button>
                <button class="btn btn-outline btn-sm" style="margin-left:6px" onclick='addToCart("${ev.name.replace(/'/g, "\\'")}", "Standard", ${ev.stdPrice}, "${currency}")'>Buy Standard</button>
              </div>
            </div>`;
        }).join('');

      } catch (e) {
        container.innerHTML = '<p class="text-gray" style="text-align:center;padding:40px;grid-column:1/-1">Could not load events.</p>';
      }
    }

    function filterEvents() {
      const input = document.getElementById('searchInput').value.toLowerCase();
      const cards = document.querySelectorAll('.event-card');
      cards.forEach(card => {
        const title = (card.getAttribute('data-title') || '').toLowerCase();
        const venue = (card.getAttribute('data-venue') || '').toLowerCase();
        card.style.display = title.includes(input) || venue.includes(input) ? 'block' : 'none';
      });
    }

    function addToCart(name, category, price, currency) {
      let cart = JSON.parse(localStorage.getItem('cart') || '[]');
      cart.push({ name, category, price, currency, qty: 1 });
      localStorage.setItem('cart', JSON.stringify(cart));
      alert(`${name} (${category}) added to cart!`);
    }

    checkUser();
    loadEvents();
  </script>
</body>
</html>
