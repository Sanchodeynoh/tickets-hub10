<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Events — TICKETS HUB</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">
        <div class="logo-icon">TH</div>
        <span>TICKETS <span class="purple">HUB</span></span>
      </a>
      <button class="menu-toggle" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
      <div class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="events.html" class="active">Events</a>
        <a href="login.html">Sign In</a>
        <a href="cart.html" class="cart-link"><i class="fas fa-shopping-cart"></i> <span class="cart-badge">0</span></a>
      </div>
    </div>
  </nav>

  <section class="page-section">
    <h1>Upcoming Events</h1>
    
    <div class="search-bar">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="Search events, venues, cities..." onkeyup="filterEvents()">
    </div>

    <div class="events-grid" id="eventsContainer"></div>
  </section>

  <footer>
    <div class="footer-content">
      <div class="logo" style="justify-content:center">
        <div class="logo-icon">TH</div>
        <span>TICKETS <span class="purple">HUB</span></span>
      </div>
      <p>Your trusted marketplace for premium tickets worldwide.</p>
      <p class="copyright">&copy; 2026 TICKETS HUB. All rights reserved.</p>
    </div>
  </footer>

  <script>
    function toggleMenu() { document.getElementById('navLinks').classList.toggle('show'); }

    function getEvents() {
      return JSON.parse(localStorage.getItem('th_events') || '[]');
    }

    function loadEvents() {
      const events = getEvents();
      const container = document.getElementById('eventsContainer');
      
      if (events.length === 0) {
        container.innerHTML = '<p class="text-gray" style="text-align:center;padding:40px">No events available yet. Check back soon!</p>';
        return;
      }

      container.innerHTML = events.map((ev, i) => `
        <div class="event-card" data-title="${ev.name}" data-venue="${ev.venue}">
          <div class="event-img" style="background-image:url('${ev.image}')"></div>
          <div class="event-info">
            <h3>${ev.name}</h3>
            <p><i class="fas fa-calendar"></i> ${new Date(ev.date).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' })}</p>
            <p><i class="fas fa-map-marker-alt"></i> ${ev.venue}, ${ev.city}</p>
            <div style="margin: 10px 0">
              <span class="badge">VIP</span>
              <span class="price" style="display:inline;font-size:1em">${ev.city.includes('South Korea') ? '₩' : ev.city.includes('Japan') ? '¥' : '฿'}${(ev.vipPrice || 0).toLocaleString()}</span>
            </div>
            <div style="margin: 10px 0">
              <span class="badge standard">Standard</span>
              <span class="price" style="display:inline;font-size:1em">${ev.city.includes('South Korea') ? '₩' : ev.city.includes('Japan') ? '¥' : '฿'}${(ev.stdPrice || 0).toLocaleString()}</span>
            </div>
            <button class="btn btn-primary btn-sm" onclick="addToCart('${ev.name.replace(/'/g, "\\'")}', 'VIP', ${ev.vipPrice}, '${ev.city.includes('South Korea') ? '₩' : ev.city.includes('Japan') ? '¥' : '฿'}')">Buy VIP</button>
            <button class="btn btn-outline btn-sm" style="margin-left:8px" onclick="addToCart('${ev.name.replace(/'/g, "\\'")}', 'Standard', ${ev.stdPrice}, '${ev.city.includes('South Korea') ? '₩' : ev.city.includes('Japan') ? '¥' : '฿'}')">Buy Standard</button>
          </div>
        </div>
      `).join('');
    }

    function filterEvents() {
      const input = document.getElementById('searchInput').value.toLowerCase();
      const cards = document.querySelectorAll('.event-card');
      cards.forEach(card => {
        const title = card.getAttribute('data-title').toLowerCase();
        const venue = card.getAttribute('data-venue').toLowerCase();
        card.style.display = title.includes(input) || venue.includes(input) ? 'block' : 'none';
      });
    }

    function addToCart(name, category, price, currency) {
      let cart = JSON.parse(localStorage.getItem('cart') || '[]');
      cart.push({ name, category, price, currency, qty: 1 });
      localStorage.setItem('cart', JSON.stringify(cart));
      document.querySelectorAll('.cart-badge').forEach(b => b.textContent = cart.length);
      alert(`${name} (${category}) added to cart!`);
    }

    function updateCartBadge() {
      const cart = JSON.parse(localStorage.getItem('cart') || '[]');
      document.querySelectorAll('.cart-badge').forEach(b => b.textContent = cart.length);
    }

    loadEvents();
    updateCartBadge();
  </script>
</body>
</html>
