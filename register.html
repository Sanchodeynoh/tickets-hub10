<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — TICKETS HUB</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">
        <div class="logo-icon">TH</div>
        <span>TICKETS <span class="purple">HUB</span></span>
      </a>
      <button class="menu-toggle" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
      <div class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="events.html">Events</a>
        <a href="login.html">Sign In</a>
        <a href="cart.html" class="cart-link"><i class="fas fa-shopping-cart"></i> <span class="cart-badge">0</span></a>
      </div>
    </div>
  </nav>

  <section class="auth-section">
    <div class="auth-box">
      <div class="logo" style="justify-content:center;margin-bottom:20px">
        <div class="logo-icon">TH</div>
        <span>TICKETS <span class="purple">HUB</span></span>
      </div>
      <h2>Create Account</h2>
      <p class="text-gray">Join TICKETS HUB today</p>
      <div id="registerMessage" style="display:none;margin-bottom:10px;padding:10px;border-radius:6px;font-size:13px"></div>
      <form id="registerForm">
        <input type="text" id="regName" placeholder="Full Name" required>
        <input type="email" id="regEmail" placeholder="Email" required>
        <input type="password" id="regPassword" placeholder="Password (min 6 characters)" required minlength="6">
        <input type="password" id="regConfirm" placeholder="Confirm Password" required>
        <button type="submit" class="btn btn-primary btn-block">Create Account</button>
      </form>
      <p class="text-gray" style="margin-top:15px">Already have an account? <a href="login.html" class="purple">Sign In</a></p>
    </div>
  </section>

  <footer>
    <div class="footer-content">
      <div class="logo" style="justify-content:center">
        <div class="logo-icon">TH</div>
        <span>TICKETS <span class="purple">HUB</span></span>
      </div>
      <p>Your trusted marketplace for premium tickets worldwide.</p>
      <p class="copyright">&copy; 2026 TICKETS HUB. All rights reserved.</p>
    </div>
  </footer>

  <script>
    const BACKEND_URL = 'https://tickets-hub10-backend.onrender.com';

    function toggleMenu() { document.getElementById('navLinks').classList.toggle('show'); }

    document.getElementById('registerForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const name = document.getElementById('regName').value;
      const email = document.getElementById('regEmail').value;
      const password = document.getElementById('regPassword').value;
      const confirm = document.getElementById('regConfirm').value;
      const msg = document.getElementById('registerMessage');

      // Client-side validation
      if (password !== confirm) {
        msg.style.display = 'block';
        msg.style.background = '#2d1b1b';
        msg.style.border = '1px solid #ff4444';
        msg.style.color = '#ff6666';
        msg.textContent = 'Passwords do not match';
        return;
      }

      if (password.length < 6) {
        msg.style.display = 'block';
        msg.style.background = '#2d1b1b';
        msg.style.border = '1px solid #ff4444';
        msg.style.color = '#ff6666';
        msg.textContent = 'Password must be at least 6 characters';
        return;
      }

      try {
        const res = await fetch(`${BACKEND_URL}/api/users/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });

        const data = await res.json();

        if (data.success) {
          msg.style.display = 'block';
          msg.style.background = '#1a3a1a';
          msg.style.border = '1px solid #4CAF50';
          msg.style.color = '#4CAF50';
          msg.textContent = 'Account created successfully! Redirecting to login...';
          
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 1500);
        } else {
          msg.style.display = 'block';
          msg.style.background = '#2d1b1b';
          msg.style.border = '1px solid #ff4444';
          msg.style.color = '#ff6666';
          msg.textContent = data.message || 'Registration failed. Email may already be in use.';
        }
      } catch (error) {
        msg.style.display = 'block';
        msg.style.background = '#2d1b1b';
        msg.style.border = '1px solid #ff4444';
        msg.style.color = '#ff6666';
        msg.textContent = 'Could not connect to server. Make sure the backend is running.';
      }
    });
  </script>
</body>
</html>
