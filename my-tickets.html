<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Tickets — TICKETS HUB</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div class="top-bar">
    <div class="top-bar-content">
      <a href="index.html" class="logo">
        <div class="logo-icon">TH</div>
        <span>TICKETS <span class="purple">HUB</span></span>
      </a>
      <div id="userGreeting" class="user-greeting"></div>
    </div>
  </div>

  <section class="page-section" style="padding-top:80px">
    <h1><i class="fas fa-ticket-alt purple"></i> My Tickets</h1>
    <div id="ticketsContainer">
      <div class="empty-cart">
        <i class="fas fa-ticket-alt" style="font-size:64px;color:#555"></i>
        <p>No tickets yet</p>
        <a href="events.html" class="btn btn-primary">Browse Events</a>
      </div>
    </div>
  </section>

  <nav class="bottom-nav">
    <a href="index.html" class="bottom-nav-item">
      <i class="fas fa-compass"></i>
      <span>Discover</span>
    </a>
    <a href="events.html" class="bottom-nav-item">
      <i class="fas fa-fire"></i>
      <span>For You</span>
    </a>
    <a href="my-tickets.html" class="bottom-nav-item active">
      <i class="fas fa-ticket-alt"></i>
      <span>My Tickets</span>
    </a>
    <a href="account.html" class="bottom-nav-item">
      <i class="fas fa-user"></i>
      <span>Account</span>
    </a>
  </nav>

  <footer style="margin-bottom:70px">
    <div class="footer-content">
      <div class="logo" style="justify-content:center">
        <div class="logo-icon">TH</div>
        <span>TICKETS <span class="purple">HUB</span></span>
      </div>
      <p>Your trusted marketplace for premium tickets worldwide.</p>
      <p class="copyright">&copy; 2026 TICKETS HUB. All rights reserved.</p>
    </div>
  </footer>

  <script>
    const BACKEND_URL = 'https://tickets-hub10-backend.onrender.com';

    function checkUser() {
      const user = JSON.parse(localStorage.getItem('th_user') || 'null');
      const greeting = document.getElementById('userGreeting');
      if (user) {
        greeting.innerHTML = `<span style="color:#C77DFF">Hi, ${user.name}</span>`;
      } else {
        greeting.innerHTML = `<a href="login.html" style="color:#999;text-decoration:none;font-size:14px">Sign In</a>`;
      }
    }

    async function loadTickets() {
      const user = JSON.parse(localStorage.getItem('th_user') || 'null');
      const container = document.getElementById('ticketsContainer');
      
      if (!user) {
        container.innerHTML = `
          <div class="empty-cart">
            <i class="fas fa-user-lock" style="font-size:64px;color:#555"></i>
            <p>Sign in to see your tickets</p>
            <a href="login.html" class="btn btn-primary">Sign In</a>
          </div>`;
        return;
      }

      try {
        const res = await fetch(`${BACKEND_URL}/api/orders`);
        const orders = await res.json();
        const myOrders = orders.filter(o => o.customer.email === user.email);

        if (myOrders.length === 0) {
          container.innerHTML = `
            <div class="empty-cart">
              <i class="fas fa-ticket-alt" style="font-size:64px;color:#555"></i>
              <p>No tickets purchased yet</p>
              <a href="events.html" class="btn btn-primary">Browse Events</a>
            </div>`;
          return;
        }

        container.innerHTML = myOrders.map(order => `
          <div class="order-card" style="margin-bottom:12px">
            <div style="display:flex;justify-content:space-between;align-items:center">
              <div>
                <p><strong>Order #${order.id}</strong></p>
                <p class="text-gray" style="font-size:13px">${new Date(order.date).toLocaleDateString()}</p>
              </div>
              <span class="badge ${order.status === 'completed' ? 'standard' : ''}">${order.status}</span>
            </div>
            <div style="margin-top:8px;font-size:13px;color:#ccc">
              ${(order.items || []).map(item => `<div>🎫 ${item.name} (${item.category}) x${item.qty || 1}</div>`).join('')}
            </div>
            <p class="price" style="font-size:14px;margin-top:5px">Total: ₩${(order.total || 0).toLocaleString()}</p>
          </div>
        `).join('');
      } catch (e) {
        container.innerHTML = '<p class="text-gray" style="text-align:center;padding:40px">Could not load tickets.</p>';
      }
    }

    checkUser();
    loadTickets();
  </script>
</body>
</html>
