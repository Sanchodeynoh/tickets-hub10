<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — TICKETS HUB</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">
        <div class="logo-icon">TH</div>
        <span>TICKETS <span class="purple">HUB</span></span>
      </a>
      <button class="menu-toggle" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
      <div class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="events.html">Events</a>
        <a href="login.html" class="active">Sign In</a>
        <a href="cart.html" class="cart-link"><i class="fas fa-shopping-cart"></i> <span class="cart-badge">0</span></a>
      </div>
    </div>
  </nav>

  <section class="auth-section">
    <div class="auth-box">
      <div class="logo" style="justify-content:center;margin-bottom:20px">
        <div class="logo-icon">TH</div>
        <span>TICKETS <span class="purple">HUB</span></span>
      </div>
      <h2>Welcome Back</h2>
      <p class="text-gray">Sign in to your account</p>
      <div id="loginMessage" style="display:none;margin-bottom:10px;padding:10px;border-radius:6px;font-size:13px"></div>
      <form id="loginForm">
        <input type="email" id="loginEmail" placeholder="Email" required>
        <input type="password" id="loginPassword" placeholder="Password" required>
        <button type="submit" class="btn btn-primary btn-block">Sign In</button>
      </form>
      <p class="text-gray" style="margin-top:15px">Don't have an account? <a href="register.html" class="purple">Register</a></p>
    </div>
  </section>

  <footer>
    <div class="footer-content">
      <div class="logo" style="justify-content:center">
        <div class="logo-icon">TH</div>
        <span>TICKETS <span class="purple">HUB</span></span>
      </div>
      <p>Your trusted marketplace for premium tickets worldwide.</p>
      <p class="copyright">&copy; 2026 TICKETS HUB. All rights reserved.</p>
    </div>
  </footer>

  <script>
    const BACKEND_URL = 'https://tickets-hub10-backend.onrender.com';

    function toggleMenu() { document.getElementById('navLinks').classList.toggle('show'); }

    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      const msg = document.getElementById('loginMessage');

      try {
        const res = await fetch(`${BACKEND_URL}/api/users/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (data.success) {
          localStorage.setItem('th_user', JSON.stringify(data.user));
          msg.style.display = 'block';
          msg.style.background = '#1a3a1a';
          msg.style.border = '1px solid #4CAF50';
          msg.style.color = '#4CAF50';
          msg.textContent = 'Login successful! Redirecting...';
          
          setTimeout(() => {
            if (data.user.isAdmin) {
              window.location.href = 'admin.html';
            } else {
              window.location.href = 'index.html';
            }
          }, 1000);
        } else {
          msg.style.display = 'block';
          msg.style.background = '#2d1b1b';
          msg.style.border = '1px solid #ff4444';
          msg.style.color = '#ff6666';
          msg.textContent = data.message || 'Invalid email or password';
        }
      } catch (error) {
        msg.style.display = 'block';
        msg.style.background = '#2d1b1b';
        msg.style.border = '1px solid #ff4444';
        msg.style.color = '#ff6666';
        msg.textContent = 'Could not connect to server. Make sure the backend is running.';
      }
    });
  </script>
</body>
</html>
