<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart — TICKETS HUB</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <div class="top-bar">
    <div class="top-bar-content">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="hamburger-btn" onclick="toggleHamburger()">
          <i class="fas fa-bars"></i>
        </button>
        <a href="index.html" class="logo">
          <div class="logo-icon">TH</div>
          <span>TICKETS <span class="purple">HUB</span></span>
        </a>
      </div>
      <div id="userGreeting" class="user-greeting"></div>
    </div>
  </div>

  <div class="menu-overlay" id="menuOverlay" onclick="toggleHamburger()"></div>
  <div class="hamburger-menu" id="hamburgerMenu">
    <div class="menu-section">Menu</div>
    <a href="index.html"><i class="fas fa-home"></i> Home</a>
    <a href="events.html"><i class="fas fa-fire"></i> For You</a>
    <a href="my-tickets.html"><i class="fas fa-ticket-alt"></i> My Tickets</a>
    <a href="cart.html" class="active"><i class="fas fa-shopping-cart"></i> Cart</a>
    <div class="menu-section">Account</div>
    <a href="account.html"><i class="fas fa-user"></i> My Account</a>
    <a href="login.html" id="menuLogin"><i class="fas fa-sign-in-alt"></i> Sign In</a>
    <a href="register.html" id="menuRegister"><i class="fas fa-user-plus"></i> Register</a>
    <div class="menu-section" id="adminMenuSection" style="display:none">Admin</div>
    <a href="admin.html" id="menuAdmin" style="display:none"><i class="fas fa-cog"></i> Admin Panel</a>
    <a href="#" id="menuLogout" style="display:none" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Sign Out</a>
  </div>

  <section class="page-section">
    <h1><i class="fas fa-shopping-cart purple"></i> Shopping Cart</h1>
    <div id="cartContainer"></div>
  </section>

  <nav class="bottom-nav">
    <a href="index.html" class="bottom-nav-item">
      <i class="fas fa-compass"></i>
      <span>Discover</span>
    </a>
    <a href="events.html" class="bottom-nav-item">
      <i class="fas fa-fire"></i>
      <span>For You</span>
    </a>
    <a href="my-tickets.html" class="bottom-nav-item">
      <i class="fas fa-ticket-alt"></i>
      <span>My Tickets</span>
    </a>
    <a href="account.html" class="bottom-nav-item">
      <i class="fas fa-user"></i>
      <span>My Account</span>
    </a>
  </nav>

  <footer>
    <div class="footer-content">
      <div class="logo" style="justify-content:center">
        <div class="logo-icon">TH</div>
        <span>TICKETS <span class="purple">HUB</span></span>
      </div>
      <p>Your trusted marketplace for premium tickets worldwide.</p>
      <p class="copyright">&copy; 2026 TICKETS HUB. All rights reserved.</p>
    </div>
  </footer>

  <script>
    function toggleHamburger() {
      document.getElementById('hamburgerMenu').classList.toggle('show');
      document.getElementById('menuOverlay').classList.toggle('show');
    }

    function logout() {
      localStorage.removeItem('th_user');
      window.location.href = 'index.html';
    }

    function checkUser() {
      const user = JSON.parse(localStorage.getItem('th_user') || 'null');
      const greeting = document.getElementById('userGreeting');
      const menuLogin = document.getElementById('menuLogin');
      const menuRegister = document.getElementById('menuRegister');
      const menuLogout = document.getElementById('menuLogout');
      const menuAdmin = document.getElementById('menuAdmin');
      const adminSection = document.getElementById('adminMenuSection');

      if (user) {
        greeting.innerHTML = `<span style="color:#C77DFF">Hi, ${user.name}</span>`;
        menuLogin.style.display = 'none';
        menuRegister.style.display = 'none';
        menuLogout.style.display = 'flex';
        if (user.isAdmin) {
          menuAdmin.style.display = 'flex';
          adminSection.style.display = 'block';
        }
      } else {
        greeting.innerHTML = `<a href="login.html" style="color:#999;text-decoration:none;font-size:14px">Sign In</a>`;
        menuLogin.style.display = 'flex';
        menuRegister.style.display = 'flex';
        menuLogout.style.display = 'none';
        menuAdmin.style.display = 'none';
        adminSection.style.display = 'none';
      }
    }

    function loadCart() {
      const cart = JSON.parse(localStorage.getItem('cart') || '[]');
      const container = document.getElementById('cartContainer');

      if (cart.length === 0) {
        container.innerHTML = `
          <div class="empty-cart">
            <i class="fas fa-shopping-cart" style="font-size:64px;color:#555"></i>
            <p>Your cart is empty</p>
            <a href="events.html" class="btn btn-primary">Browse Events</a>
          </div>`;
        return;
      }

      // Group identical items
      const grouped = {};
      cart.forEach(item => {
        const key = item.name + '|' + item.category + '|' + item.price + '|' + item.currency;
        if (grouped[key]) {
          grouped[key].qty += 1;
        } else {
          grouped[key] = { ...item, qty: 1 };
        }
      });

      const groupedItems = Object.values(grouped);
      let html = '<div class="cart-items">';
      let total = 0;

      groupedItems.forEach((item, index) => {
        const itemTotal = item.price * item.qty;
        total += itemTotal;
        html += `
          <div class="cart-item">
            <div>
              <h3>${item.name}</h3>
              <p class="text-gray">${item.category} &middot; Qty: ${item.qty}</p>
            </div>
            <div class="cart-item-right">
              <span class="price">${item.currency}${itemTotal.toLocaleString()}</span>
              <button class="btn-remove" onclick="removeItem(${index})"><i class="fas fa-trash"></i></button>
            </div>
          </div>`;
      });

      html += `</div>
        <div class="cart-summary">
          <div class="cart-total">
            <span style="font-size:1.1em">Total</span>
            <span class="price" style="font-size:1.3em">₩${total.toLocaleString()}</span>
          </div>
          <button class="btn btn-primary btn-block" onclick="checkout()">Proceed to Checkout</button>
        </div>`;

      container.innerHTML = html;
    }

    function removeItem(index) {
      let cart = JSON.parse(localStorage.getItem('cart') || '[]');
      
      const grouped = {};
      cart.forEach(item => {
        const key = item.name + '|' + item.category + '|' + item.price + '|' + item.currency;
        if (grouped[key]) {
          grouped[key].qty += 1;
        } else {
          grouped[key] = { ...item, qty: 1 };
        }
      });
      
      const groupedItems = Object.values(grouped);
      const targetItem = groupedItems[index];
      
      if (targetItem) {
        const key = targetItem.name + '|' + targetItem.category + '|' + targetItem.price + '|' + targetItem.currency;
        const removeIndex = cart.findIndex(item => {
          return (item.name + '|' + item.category + '|' + item.price + '|' + item.currency) === key;
        });
        if (removeIndex !== -1) {
          cart.splice(removeIndex, 1);
        }
      }

      localStorage.setItem('cart', JSON.stringify(cart));
      loadCart();
    }

    function checkout() {
      const cart = JSON.parse(localStorage.getItem('cart') || '[]');
      if (cart.length === 0) {
        alert('Your cart is empty!');
        return;
      }
      window.location.href = 'checkout.html';
    }

    checkUser();
    loadCart();
  </script>
</body>
  </html>
