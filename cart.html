<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart — TICKETS HUB</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">
        <div class="logo-icon">TH</div>
        <span>TICKETS <span class="purple">HUB</span></span>
      </a>
      <button class="menu-toggle" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
      <div class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="events.html">Events</a>
        <a href="login.html">Sign In</a>
        <a href="cart.html" class="active cart-link"><i class="fas fa-shopping-cart"></i> <span class="cart-badge">0</span></a>
      </div>
    </div>
  </nav>

  <section class="page-section">
    <h1><i class="fas fa-shopping-cart purple"></i> Shopping Cart</h1>
    <div id="cartContainer"></div>
  </section>

  <footer>
    <div class="footer-content">
      <div class="logo" style="justify-content:center">
        <div class="logo-icon">TH</div>
        <span>TICKETS <span class="purple">HUB</span></span>
      </div>
      <p>Your trusted marketplace for premium tickets worldwide.</p>
      <p class="copyright">&copy; 2026 TICKETS HUB. All rights reserved.</p>
    </div>
  </footer>

  <script>
    function toggleMenu() { document.getElementById('navLinks').classList.toggle('show'); }

    function loadCart() {
      const cart = JSON.parse(localStorage.getItem('cart') || '[]');
      const container = document.getElementById('cartContainer');

      // Update badge
      document.querySelectorAll('.cart-badge').forEach(b => b.textContent = cart.length);

      if (cart.length === 0) {
        container.innerHTML = `
          <div class="empty-cart">
            <i class="fas fa-shopping-cart" style="font-size:64px;color:#555"></i>
            <p>Your cart is empty</p>
            <a href="events.html" class="btn btn-primary">Browse Events</a>
          </div>`;
        return;
      }

      // Group identical items and count quantities
      const grouped = {};
      cart.forEach(item => {
        const key = item.name + '|' + item.category + '|' + item.price + '|' + item.currency;
        if (grouped[key]) {
          grouped[key].qty += 1;
        } else {
          grouped[key] = { ...item, qty: 1 };
        }
      });

      const groupedItems = Object.values(grouped);
      let html = '<div class="cart-items">';
      let total = 0;

      groupedItems.forEach((item, index) => {
        const itemTotal = item.price * item.qty;
        total += itemTotal;
        html += `
          <div class="cart-item">
            <div>
              <h3>${item.name}</h3>
              <p class="text-gray">${item.category} &middot; Qty: ${item.qty}</p>
            </div>
            <div class="cart-item-right">
              <span class="price">${item.currency}${itemTotal.toLocaleString()}</span>
              <button class="btn-remove" onclick="removeItem(${index})"><i class="fas fa-trash"></i></button>
            </div>
          </div>`;
      });

      html += `</div>
        <div class="cart-summary">
          <div class="cart-total">
            <span style="font-size:1.1em">Total</span>
            <span class="price" style="font-size:1.3em">₩${total.toLocaleString()}</span>
          </div>
          <button class="btn btn-primary btn-block" onclick="checkout()">Proceed to Checkout</button>
        </div>`;

      container.innerHTML = html;
    }

    function removeItem(index) {
      let cart = JSON.parse(localStorage.getItem('cart') || '[]');
      
      // Get the item at this displayed index (grouped)
      const grouped = {};
      cart.forEach(item => {
        const key = item.name + '|' + item.category + '|' + item.price + '|' + item.currency;
        if (grouped[key]) {
          grouped[key].qty += 1;
        } else {
          grouped[key] = { ...item, qty: 1, _cartIndex: cart.indexOf(item) };
        }
      });
      
      const groupedItems = Object.values(grouped);
      const targetItem = groupedItems[index];
      
      if (targetItem) {
        // Find and remove ONE instance of this item from cart
        const key = targetItem.name + '|' + targetItem.category + '|' + targetItem.price + '|' + targetItem.currency;
        const removeIndex = cart.findIndex(item => {
          return (item.name + '|' + item.category + '|' + item.price + '|' + item.currency) === key;
        });
        if (removeIndex !== -1) {
          cart.splice(removeIndex, 1);
        }
      }

      localStorage.setItem('cart', JSON.stringify(cart));
      loadCart();
    }

    function checkout() {
      const cart = JSON.parse(localStorage.getItem('cart') || '[]');
      if (cart.length === 0) {
        alert('Your cart is empty!');
        return;
      }
      window.location.href = 'checkout.html';
    }

    loadCart();
  </script>
</body>
  </html>
